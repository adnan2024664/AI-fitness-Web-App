<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Goals - My Fitness AI</title>
    <link rel="stylesheet" href="Css/style.css">
</head>

<body class="fitness-goals-body">


    <div class="title-box">
        <h1>Your Fitness Goals</h1>
    </div>

    <p class="subheading">Please choose an option from below:</p>
   
    <!-- Fitness Goals Selection -->
    <div class="goals-container">
        <div class="goal-option" data-goal="workout-anywhere">
            <img src="assets/workout anywhere.jpg" alt="Workout Anywhere">
            <p>Workout Anywhere</p>
        </div>

        <div class="goal-option" data-goal="strength-training">
            <img src="assets/strength training.jpg" alt="Strength Training">
            <p>Strength Training</p>
        </div>

        <div class="goal-option" data-goal="stay-healthy">
            <img src="assets/Stay fit.jpg" alt="Stay Healthy">
            <p>Stay Healthy</p>
        </div>
    </div>

    <button id="proceedBtn" class="goals-btn" disabled>Proceed</button>

    <script src="Js/script.js"></script>
</body>
</html>
