<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - My Fitness AI</title>
    <link rel="stylesheet" href="Css/style.css">
</head>
<body class="signup-body">

    <img src="assets/muscular man.png" class="background-icon">

    <div class="title-box">
        <h1>Create Your Account</h1>
    </div>

    <a href="index.html" class="back-button">← Back</a>

    <div class="form-container">
        <img src="assets/logo.png" class="form-logo">

        <form id="signupForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>

            <label class="checkbox-label">
                <input type="checkbox" id="terms" required> I agree to the <a href="#">terms & conditions</a>
            </label>

            <button type="submit" class="signup-btn">Sign Up</button>
        </form>

        <p id="message"></p>
    </div>

    <script src="Js/script.js"></script>
</body>
</html>
